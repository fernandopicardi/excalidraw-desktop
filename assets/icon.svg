<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#ffffff" stroke="#e0e0e0" stroke-width="8"/>

  <!-- Excalidraw-style drawing elements -->
  <!-- Rectangle -->
  <rect x="60" y="60" width="60" height="40" fill="none" stroke="#6965db" stroke-width="3" stroke-linecap="round"/>

  <!-- Circle -->
  <circle cx="180" cy="80" r="25" fill="none" stroke="#6965db" stroke-width="3" stroke-linecap="round"/>

  <!-- Arrow -->
  <path d="M120 120 L160 120 L160 100 L180 120 L160 140 L160 120" fill="none" stroke="#6965db" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Mermaid-style flowchart elements -->
  <!-- Diamond -->
  <path d="M100 180 L120 160 L140 180 L120 200 Z" fill="none" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Text labels -->
  <text x="90" y="70" font-family="Arial, sans-serif" font-size="12" fill="#333">E</text>
  <text x="170" y="85" font-family="Arial, sans-serif" font-size="12" fill="#333">M</text>
  <text x="110" y="195" font-family="Arial, sans-serif" font-size="12" fill="#333">+</text>
</svg>
